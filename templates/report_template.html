<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    body { margin: 0; background: #f6f7f9; color: #1f2933; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; line-height: 1.65; }
    main { max-width: 980px; margin: 0 auto; padding: 40px 24px 64px; background: #fff; min-height: 100vh; }
    h1 { font-size: 30px; margin: 0 0 24px; color: #102a43; }
    h2 { font-size: 21px; margin: 32px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #d9e2ec; color: #243b53; }
    table { border-collapse: collapse; width: 100%; margin: 14px 0 20px; font-size: 14px; }
    th, td { border: 1px solid #d9e2ec; padding: 9px 10px; text-align: left; vertical-align: top; }
    th { background: #f0f4f8; color: #102a43; }
    img { max-width: 100%; height: auto; display: block; margin: 16px 0; border: 1px solid #d9e2ec; }
    code, pre { background: #f0f4f8; border-radius: 4px; }
    pre { padding: 12px; overflow: auto; }
    li { margin: 4px 0; }
  </style>
</head>
<body>
  <main>
    {{BODY}}
  </main>
</body>
</html>
